<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#667eea">
  <title>Spelling Bee v0.25</title>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  -webkit-user-select: none;
  user-select: none;
}

.app {
  background: white;
  border-radius: 30px;
  padding: 40px 30px;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.title-screen h1 {
  font-size: 2.5rem;
  color: #333;
  margin-bottom: 10px;
}

.title-bee {
  font-size: 4rem;
  display: block;
  margin: 10px 0 20px;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

.level-buttons {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-top: 20px;
}

.level-btn {
  padding: 18px 30px;
  font-size: 1.3rem;
  font-weight: 700;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  color: white;
}

.level-btn:active {
  transform: scale(0.95);
}

.level-btn.easy {
  background: linear-gradient(135deg, #43e97b, #38f9d7);
  box-shadow: 0 6px 20px rgba(67, 233, 123, 0.4);
}

.level-btn.medium {
  background: linear-gradient(135deg, #f6d365, #fda085);
  box-shadow: 0 6px 20px rgba(253, 160, 133, 0.4);
}

.level-btn.hard {
  background: linear-gradient(135deg, #f093fb, #f5576c);
  box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
}

.level-btn.tricky {
  background: linear-gradient(135deg, #a18cd1, #fbc2eb);
  box-shadow: 0 6px 20px rgba(161, 140, 209, 0.4);
}

.level-btn.tricky::after {
  content: ' \u2728';
}

.level-btn.weak {
  background: linear-gradient(135deg, #f5576c, #ff6b6b);
  box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
  position: relative;
}

.badge {
  display: inline-block;
  background: white;
  color: #f5576c;
  font-size: 0.85rem;
  font-weight: 800;
  padding: 2px 10px;
  border-radius: 12px;
  margin-left: 8px;
}

.reset-btn {
  margin-top: 20px;
  padding: 8px 16px;
  font-size: 0.8rem;
  border: none;
  background: none;
  color: #ccc;
  cursor: pointer;
}

.reset-btn:active {
  color: #999;
}

.tricky-menu-screen {
  display: none;
}

.tricky-menu-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.tricky-menu-header h2 {
  font-size: 1.5rem;
  color: #333;
}

.tricky-menu-subtitle {
  color: #888;
  font-size: 0.95rem;
  margin-bottom: 20px;
}

.category-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.category-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 18px;
  border: 2px solid #eee;
  border-radius: 16px;
  background: white;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.2s;
  text-align: left;
  width: 100%;
}

.category-btn:active {
  transform: scale(0.97);
}

.category-btn:hover {
  border-color: #a18cd1;
}

.cat-icon {
  font-size: 1.8rem;
  flex-shrink: 0;
  width: 44px;
  text-align: center;
}

.cat-info {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.cat-name {
  font-size: 1.05rem;
  font-weight: 700;
  color: #333;
}

.cat-count {
  font-size: 0.8rem;
  color: #999;
}

.cat-mastery {
  flex-shrink: 0;
  width: 70px;
  text-align: center;
}

.mastery-bar {
  display: flex;
  width: 100%;
  height: 8px;
  background: #eee;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 3px;
}

.mastery-fill {
  height: 100%;
  transition: width 0.4s ease;
}

.mastery-mastered { background: #43e97b; }
.mastery-learning { background: #f6d365; }
.mastery-struggling { background: #f5576c; }

.mastery-label {
  font-size: 0.7rem;
  color: #999;
}

.game-screen { display: none; }

.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.back-btn {
  background: #eee;
  border: none;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  font-size: 1.3rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.score-display {
  font-size: 1.1rem;
  font-weight: 700;
  color: #667eea;
}

.mastery-indicator {
  font-size: 0.75rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 10px;
}

.mastery-new { background: #eee; color: #888; }
.mastery-struggling-badge { background: #fde8ec; color: #f5576c; }
.mastery-learning-badge { background: #fef9e7; color: #e67e22; }
.mastery-mastered-badge { background: #e8fdf0; color: #27ae60; }

.progress-bar {
  width: 100%;
  height: 12px;
  background: #eee;
  border-radius: 6px;
  margin-bottom: 30px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #43e97b, #38f9d7);
  border-radius: 6px;
  transition: width 0.4s ease;
}

.word-area { margin: 30px 0; }

.listen-btn {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-size: 2.5rem;
  cursor: pointer;
  box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
  transition: transform 0.15s;
  margin-bottom: 10px;
}

.listen-btn:active { transform: scale(0.9); }

.listen-label {
  font-size: 1rem;
  color: #888;
  margin-bottom: 25px;
}

.hint-text {
  font-size: 1rem;
  color: #aaa;
  margin-bottom: 20px;
  min-height: 1.5em;
}

.letter-input-area {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 25px;
  min-height: 60px;
}

.letter-box {
  width: 48px;
  height: 56px;
  border: 3px solid #ddd;
  border-radius: 12px;
  font-size: 1.5rem;
  font-weight: 700;
  text-align: center;
  text-transform: uppercase;
  outline: none;
  transition: border-color 0.2s, transform 0.2s;
  -webkit-appearance: none;
  color: #333;
  background: #fafafa;
}

.letter-box:focus {
  border-color: #667eea;
  transform: scale(1.08);
  background: white;
}

.letter-box.correct {
  border-color: #43e97b;
  background: #e8fdf0;
  animation: pop 0.3s ease;
}

.letter-box.wrong {
  border-color: #f5576c;
  background: #fde8ec;
  animation: shake 0.4s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

.check-btn {
  padding: 16px 50px;
  font-size: 1.3rem;
  font-weight: 700;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  color: white;
  background: linear-gradient(135deg, #667eea, #764ba2);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
  transition: transform 0.15s;
}

.check-btn:active { transform: scale(0.95); }
.check-btn:disabled { opacity: 0.5; cursor: default; }

.pattern-badge {
  display: inline-block;
  background: linear-gradient(135deg, #a18cd1, #fbc2eb);
  color: white;
  font-size: 0.85rem;
  font-weight: 700;
  padding: 6px 16px;
  border-radius: 20px;
  margin-bottom: 15px;
}

.letter-box.tricky-letter { border-color: #a18cd1; border-style: dashed; }

.letter-box.tricky-revealed {
  background: #f3e8ff;
  border-color: #a18cd1;
  border-style: solid;
  color: #7c3aed;
  animation: pop 0.3s ease;
}

.letter-box.tricky-highlight-correct {
  border-color: #7c3aed;
  background: #f3e8ff;
  animation: trickyGlow 1s ease infinite;
}

@keyframes trickyGlow {
  0%, 100% { box-shadow: 0 0 8px rgba(124, 58, 237, 0.3); }
  50% { box-shadow: 0 0 18px rgba(124, 58, 237, 0.6); }
}

.rule-hint {
  display: block;
  margin-top: 6px;
  color: #7c3aed;
  font-weight: 700;
  font-size: 0.95rem;
}

.hint-btn {
  display: block;
  margin: 15px auto 0;
  padding: 10px 20px;
  font-size: 0.95rem;
  border: 2px solid #ddd;
  border-radius: 10px;
  background: white;
  color: #888;
  cursor: pointer;
}

.tricky-reveal-btn {
  display: block;
  margin: 10px auto 0;
  padding: 10px 20px;
  font-size: 0.95rem;
  border: 2px solid #a18cd1;
  border-radius: 10px;
  background: #f3e8ff;
  color: #7c3aed;
  font-weight: 600;
  cursor: pointer;
}

.feedback {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
  animation: fadeIn 0.3s ease;
  padding: 20px;
}

.feedback.correct-feedback { background: rgba(67, 233, 123, 0.95); }
.feedback.wrong-feedback { background: rgba(245, 87, 108, 0.95); }

.feedback-emoji { font-size: 5rem; margin-bottom: 15px; }

.feedback-text {
  font-size: 2rem;
  font-weight: 700;
  color: white;
  margin-bottom: 10px;
}

.feedback-word {
  font-size: 1.5rem;
  color: rgba(255, 255, 255, 0.9);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 15px;
}

.feedback-tricky-letter {
  display: inline-block;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 6px;
  padding: 2px 4px;
  margin: 0 1px;
  border-bottom: 3px solid rgba(255, 255, 255, 0.7);
  font-weight: 800;
}

.feedback-streak {
  font-size: 1.1rem;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.9);
  background: rgba(255, 255, 255, 0.2);
  padding: 6px 18px;
  border-radius: 20px;
  margin-bottom: 10px;
}

.feedback-rule {
  font-size: 1.1rem;
  color: rgba(255, 255, 255, 0.9);
  background: rgba(255, 255, 255, 0.15);
  padding: 10px 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  max-width: 350px;
}

.feedback-continue {
  padding: 14px 40px;
  font-size: 1.2rem;
  font-weight: 700;
  border: none;
  border-radius: 15px;
  background: white;
  color: #333;
  cursor: pointer;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.results-screen { display: none; }
.results-emoji { font-size: 5rem; margin-bottom: 10px; }
.results-screen h2 { font-size: 2rem; color: #333; margin-bottom: 5px; }

.results-score {
  font-size: 3rem;
  font-weight: 800;
  color: #667eea;
  margin: 15px 0;
}

.results-message { font-size: 1.1rem; color: #888; margin-bottom: 10px; }

.results-details {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin: 20px 0 30px;
}

.result-stat { text-align: center; }
.result-stat .number { font-size: 2rem; font-weight: 800; }
.result-stat .label { font-size: 0.85rem; color: #888; }
.result-stat.correct-stat .number { color: #43e97b; }
.result-stat.wrong-stat .number { color: #f5576c; }

#mastery-summary { margin: 10px 0 20px; }

.mastery-summary-bar {
  width: 80%;
  height: 12px;
  background: #eee;
  border-radius: 6px;
  overflow: hidden;
  margin: 0 auto 8px;
}

.mastery-summary-bar .mastery-fill { height: 100%; }
.mastery-summary-text { font-size: 0.9rem; color: #888; }

.play-again-btn {
  padding: 16px 50px;
  font-size: 1.3rem;
  font-weight: 700;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  color: white;
  background: linear-gradient(135deg, #667eea, #764ba2);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
  margin-bottom: 10px;
}

.missed-words { margin-top: 20px; text-align: left; }
.missed-words h3 { font-size: 1rem; color: #888; margin-bottom: 10px; }

.missed-word-item {
  padding: 10px 15px;
  background: #fde8ec;
  border-radius: 10px;
  margin-bottom: 8px;
  font-size: 1rem;
  color: #333;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.missed-word-item .correct-spelling { font-weight: 700; color: #43e97b; }
.missed-word-item .tricky-highlight { color: #7c3aed; font-weight: 800; border-bottom: 2px solid #7c3aed; }
.missed-pattern { font-size: 0.8rem; color: #7c3aed; font-weight: 600; margin-top: 3px; }

/* --- Title Stats --- */
.title-stats {
  margin: 5px 0 10px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #f8f9ff, #eef0ff);
  border-radius: 15px;
}

.title-level {
  font-size: 1rem;
  font-weight: 700;
  color: #667eea;
}

.title-xp-bar {
  width: 100%;
  height: 8px;
  background: #ddd;
  border-radius: 4px;
  margin: 6px 0 4px;
  overflow: hidden;
}

.title-xp-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 4px;
  transition: width 0.4s ease;
}

.title-xp-text {
  font-size: 0.8rem;
  color: #999;
}

/* --- Feedback XP --- */
.feedback-xp {
  font-size: 1.3rem;
  font-weight: 800;
  color: rgba(255, 255, 255, 0.95);
  background: rgba(255, 255, 255, 0.2);
  padding: 4px 20px;
  border-radius: 20px;
  margin-bottom: 8px;
  animation: xpPop 0.5s ease;
}

@keyframes xpPop {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.3); }
  100% { transform: scale(1); opacity: 1; }
}

/* --- Results Rewards --- */
.xp-summary {
  background: linear-gradient(135deg, #f8f9ff, #eef0ff);
  border-radius: 18px;
  padding: 18px 20px;
  margin-bottom: 15px;
}

.xp-earned {
  font-size: 1.4rem;
  font-weight: 800;
  color: #667eea;
  margin-bottom: 8px;
}

.level-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 8px;
}

.level-badge {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-size: 0.85rem;
  font-weight: 800;
  padding: 3px 12px;
  border-radius: 10px;
}

.level-title {
  font-size: 1rem;
  font-weight: 700;
  color: #555;
}

.level-progress-bar {
  width: 100%;
  height: 10px;
  background: #ddd;
  border-radius: 5px;
  overflow: hidden;
  margin-bottom: 4px;
}

.level-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 5px;
  transition: width 0.6s ease;
}

.xp-to-next {
  font-size: 0.8rem;
  color: #999;
}

.stats-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 12px 0;
}

.stat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.stat-number {
  font-size: 1.1rem;
  font-weight: 700;
}

.stat-label {
  font-size: 0.7rem;
  color: #999;
}

.badges-row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px;
  margin: 8px 0;
}

.earned-badge {
  font-size: 1.5rem;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
  transition: transform 0.2s;
}

.earned-badge:active { transform: scale(1.3); }

.new-achievements {
  margin-top: 15px;
}

.achievement-title {
  font-size: 1rem;
  color: #667eea;
  margin-bottom: 10px;
}

.achievement-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(135deg, #fff9e6, #fff3cc);
  border: 2px solid #f6d365;
  border-radius: 14px;
  padding: 12px 16px;
  margin-bottom: 8px;
  animation: achievePop 0.6s ease;
  text-align: left;
}

@keyframes achievePop {
  0% { transform: scale(0.8) rotate(-5deg); opacity: 0; }
  50% { transform: scale(1.05) rotate(2deg); }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

.achievement-icon { font-size: 2rem; }

.achievement-info {
  display: flex;
  flex-direction: column;
}

.achievement-info strong { color: #333; font-size: 0.95rem; }
.achievement-info span { color: #888; font-size: 0.8rem; }

@media (min-width: 768px) {
  .app { max-width: 550px; padding: 50px 40px; }
  .title-screen h1 { font-size: 3rem; }
  .letter-box { width: 55px; height: 64px; font-size: 1.8rem; }
}
  </style>
</head>
<body>
  <div class="app">

    <!-- Title Screen -->
    <div class="title-screen" id="title-screen">
      <h1>Spelling Bee</h1>
      <span class="title-bee">&#x1F41D;</span>
      <p style="color: #888; margin-bottom: 4px;">Listen, spell, and learn!</p>
      <p style="color: #aaa; font-size: 12px; margin-bottom: 10px;">v0.25</p>
      <div class="title-stats" id="title-stats" style="display: none;">
        <span class="title-level" id="title-level"></span>
        <div class="title-xp-bar"><div class="title-xp-fill" id="title-xp-fill"></div></div>
        <span class="title-xp-text" id="title-xp-text"></span>
      </div>
      <div class="level-buttons">
        <button class="level-btn easy" onclick="startGame('easy')">Easy</button>
        <button class="level-btn medium" onclick="startGame('medium')">Medium</button>
        <button class="level-btn hard" onclick="startGame('hard')">Hard</button>
        <button class="level-btn tricky" onclick="startGame('tricky')">Tricky Words</button>
        <button class="level-btn weak" id="weak-words-btn" style="display: none;" onclick="startGame('weak')">
          Practice Weak Words <span class="weak-count badge">0</span>
        </button>
      </div>
      <button class="reset-btn" onclick="resetProgress()">Reset Progress</button>
    </div>

    <!-- Tricky Words Submenu -->
    <div class="tricky-menu-screen" id="tricky-menu-screen" style="display: none;">
      <div class="tricky-menu-header">
        <button class="back-btn" onclick="goHome()">&#x2190;</button>
        <h2>Tricky Words</h2>
        <span></span>
      </div>
      <p class="tricky-menu-subtitle">Pick a category or practice them all!</p>
      <div class="category-list" id="tricky-category-list"></div>
    </div>

    <!-- Game Screen -->
    <div class="game-screen" id="game-screen" style="display: none;">
      <div class="game-header">
        <button class="back-btn" onclick="goHome()">&#x2190;</button>
        <span class="mastery-indicator" id="mastery-indicator"></span>
        <span class="score-display" id="score-display">Score: 0 / 10</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <div class="word-area">
        <button class="listen-btn" id="listen-btn">&#x1F50A;</button>
        <p class="listen-label">Tap to hear the word</p>
        <span class="pattern-badge" id="pattern-badge" style="display: none;"></span>
        <p class="hint-text" id="hint-text"></p>
      </div>

      <div class="letter-input-area" id="letter-input-area"></div>

      <button class="check-btn" id="check-btn">Check!</button>
      <button class="hint-btn" id="hint-btn">Show Hint</button>
      <button class="tricky-reveal-btn" id="tricky-btn" style="display: none;" onclick="showTrickyLetters()">Show Tricky Letters</button>
    </div>

    <!-- Results Screen -->
    <div class="results-screen" id="results-screen" style="display: none;">
      <div class="results-emoji" id="results-emoji"></div>
      <h2 id="results-title">Great Job!</h2>
      <div class="results-score" id="results-score">0 / 10</div>
      <p class="results-message" id="results-message"></p>

  { id: 'streak_5', name: 'On Fire', icon: '\uD83D\uDD25', desc: 'Get a 5-word streak', check: r => r.bestStreak >= 5 },
  { id: 'streak_10', name: 'Unstoppable', icon: '\u26A1', desc: 'Get a 10-word streak', check: r => r.bestStreak >= 10 },
  { id: 'streak_20', name: 'Legendary', icon: '\uD83C\uDF08', desc: 'Get a 20-word streak', check: r => r.bestStreak >= 20 },
  { id: 'tricky_master', name: 'Tricky Tamer', icon: '\uD83E\uDDD9', desc: 'Master 10 tricky words', check: r => r.trickyMastered >= 10 },

  { id: 'daily_3', name: 'Daily Learner', icon: '\uD83D\uDCDA', desc: 'Play 3 rounds in one day', check: r => r.gamesPlayedToday >= 3 },
];

function loadRewards() {
  try {
    const r = JSON.parse(localStorage.getItem(REWARDS_KEY));
    if (r) { r.levelsPlayed = new Set(r.levelsPlayed || []); return r; }
  } catch {}
  return { totalXP: 0, totalCorrect: 0, totalGames: 0, perfectGames: 0, bestStreak: 0, currentStreak: 0, trickyMastered: 0, levelsPlayed: new Set(), unlockedAchievements: [], lastPlayDate: '', gamesPlayedToday: 0 };
}

function saveRewards(r) {
  const toSave = { ...r, levelsPlayed: [...r.levelsPlayed] };
  localStorage.setItem(REWARDS_KEY, JSON.stringify(toSave));
}

function getLevel(xp) {
  for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
    if (xp >= LEVEL_THRESHOLDS[i]) return i;
  }
  return 0;
}

function calcXP(isCorrect, level, usedHint, streak) {
  if (!isCorrect) return 1; // participation point
  let base = { easy: 5, medium: 10, hard: 15, tricky: 20, weak: 15 }[level] || 10;
  if (usedHint) base = Math.ceil(base * 0.5);
  // Streak bonus
  if (streak >= 5) base += 5;
  if (streak >= 10) base += 10;
  return base;
}

let state = {
  level: null, trickyCategory: null, words: [], currentIndex: 0,
  score: 0, results: [], hintsUsed: 0, trickyRevealed: false,
  sessionStreak: 0, wordHintUsed: false, newAchievements: [],
};

function loadSR() { try { return JSON.parse(localStorage.getItem(SR_STORAGE_KEY)) || {}; } catch { return {}; } }
function saveSR(data) { localStorage.setItem(SR_STORAGE_KEY, JSON.stringify(data)); }

function recordResult(word, isCorrect) {
  const sr = loadSR();
  if (!sr[word]) sr[word] = { attempts: 0, correct: 0, lastSeen: 0, streak: 0 };
  sr[word].attempts++;
  sr[word].lastSeen = Date.now();
  if (isCorrect) { sr[word].correct++; sr[word].streak++; } else { sr[word].streak = 0; }
  saveSR(sr);
}

function getWordMastery(word) {
  const sr = loadSR(); const data = sr[word];
  if (!data || data.attempts === 0) return 'new';
  const ratio = data.correct / data.attempts;
  if (data.streak >= 3 && ratio >= 0.8) return 'mastered';
  if (ratio >= 0.5) return 'learning';
  return 'struggling';
}

function getWeakWords() {
  const sr = loadSR(); const allWords = getAllWordItems(); const weak = [];
  for (const item of allWords) {
    const data = sr[item.word];
    if (data && data.attempts > 0) {
      const ratio = data.correct / data.attempts;
      if (ratio < 0.7 || data.streak === 0) weak.push({ ...item, srScore: ratio, srStreak: data.streak, srAttempts: data.attempts });
    }
  }
  weak.sort((a, b) => a.srScore - b.srScore || a.srStreak - b.srStreak);
  return weak;
}

function getAllWordItems() {
  const all = [];
  for (const level of Object.keys(WORDS)) for (const item of WORDS[level]) all.push({ ...item, sourceLevel: level });
  return all;
}

function getWeakWordCount() { return getWeakWords().length; }

function weightedShuffle(words) {
  const sr = loadSR();
  const scored = words.map(w => {
    const data = sr[w.word]; let weight = 1;
    if (data && data.attempts > 0) {
      const ratio = data.correct / data.attempts; weight = 2 - ratio;
      if (data.streak === 0) weight += 0.5;
      if (Date.now() - data.lastSeen > 86400000) weight += 0.3;
    } else { weight = 1.3; }
    return { item: w, weight, rand: Math.random() * weight };
  });
  scored.sort((a, b) => b.rand - a.rand);
  return scored.map(s => s.item);
}

const titleScreen = document.getElementById('title-screen');
const gameScreen = document.getElementById('game-screen');
const resultsScreen = document.getElementById('results-screen');
const trickyMenuScreen = document.getElementById('tricky-menu-screen');
const scoreDisplay = document.getElementById('score-display');
const progressFill = document.getElementById('progress-fill');
const listenBtn = document.getElementById('listen-btn');
const hintText = document.getElementById('hint-text');
const letterInputArea = document.getElementById('letter-input-area');
const checkBtn = document.getElementById('check-btn');
const hintBtn = document.getElementById('hint-btn');

function showScreen(screen) {
  titleScreen.style.display = 'none'; gameScreen.style.display = 'none';
  resultsScreen.style.display = 'none'; trickyMenuScreen.style.display = 'none';
  screen.style.display = 'block';
}

function updateTitleScreen() {
  const weakCount = getWeakWordCount(); const weakBtn = document.getElementById('weak-words-btn');
  if (weakCount > 0) { weakBtn.style.display = 'block'; weakBtn.querySelector('.weak-count').textContent = weakCount; }
  else { weakBtn.style.display = 'none'; }
  // Show level/XP on title
  const rewards = loadRewards();
  const statsEl = document.getElementById('title-stats');
  if (rewards.totalXP > 0) {
    statsEl.style.display = 'block';
    const level = getLevel(rewards.totalXP);
    const nextT = LEVEL_THRESHOLDS[Math.min(level + 1, LEVEL_THRESHOLDS.length - 1)];
    const prevT = LEVEL_THRESHOLDS[level];
    const pct = level >= LEVEL_THRESHOLDS.length - 1 ? 100 : ((rewards.totalXP - prevT) / (nextT - prevT) * 100).toFixed(0);
    document.getElementById('title-level').textContent = `Lv.${level + 1} ${LEVEL_TITLES[level]}`;
    document.getElementById('title-xp-fill').style.width = pct + '%';
    document.getElementById('title-xp-text').textContent = `${rewards.totalXP} XP`;
  } else { statsEl.style.display = 'none'; }
}

function showTrickyMenu() {
  showScreen(trickyMenuScreen);
  const container = document.getElementById('tricky-category-list'); container.innerHTML = '';
  const allBtn = document.createElement('button'); allBtn.className = 'category-btn';
  allBtn.onclick = () => startTrickyGame(null);
  allBtn.innerHTML = `<span class="cat-icon">\u2728</span><span class="cat-info"><span class="cat-name">All Tricky Words</span><span class="cat-count">${WORDS.tricky.length} words</span></span><span class="cat-mastery">${getMasteryBar(WORDS.tricky)}</span>`;
  container.appendChild(allBtn);
  for (const [key, cat] of Object.entries(TRICKY_CATEGORIES)) {
    const words = WORDS.tricky.filter(w => w.category === key); if (words.length === 0) continue;
    const btn = document.createElement('button'); btn.className = 'category-btn';
    btn.onclick = () => startTrickyGame(key);
    btn.innerHTML = `<span class="cat-icon">${cat.icon}</span><span class="cat-info"><span class="cat-name">${cat.name}</span><span class="cat-count">${words.length} words</span></span><span class="cat-mastery">${getMasteryBar(words)}</span>`;
    container.appendChild(btn);
  }
}

function getMasteryBar(words) {
  let mastered = 0, learning = 0, struggling = 0;
  for (const w of words) { const m = getWordMastery(w.word); if (m === 'mastered') mastered++; else if (m === 'learning') learning++; else if (m === 'struggling') struggling++; }
  const total = words.length; if (total === 0) return '';
  return `<span class="mastery-bar"><span class="mastery-fill mastery-mastered" style="width:${(mastered/total*100).toFixed(0)}%"></span><span class="mastery-fill mastery-learning" style="width:${(learning/total*100).toFixed(0)}%"></span><span class="mastery-fill mastery-struggling" style="width:${(struggling/total*100).toFixed(0)}%"></span></span><span class="mastery-label">${mastered}/${total}</span>`;
}

function startTrickyGame(categoryKey) {
  state.level = 'tricky'; state.trickyCategory = categoryKey; state.score = 0; state.currentIndex = 0; state.results = []; state.hintsUsed = 0;
  let pool = categoryKey ? WORDS.tricky.filter(w => w.category === categoryKey) : [...WORDS.tricky];
  state.words = weightedShuffle(pool).slice(0, Math.min(ROUNDS_PER_GAME, pool.length));
  showScreen(gameScreen); loadWord();
}

// --- Clear female voice ---
let femaleVoice = null;
function initVoice() {
  const voices = speechSynthesis.getVoices();
  // Priority: clearest female voices on each platform
  const preferred = [
    'Samantha',                    // iOS/Mac — clearest default
    'Google UK English Female',    // Chrome — very clear
    'Google US English',           // Chrome fallback
    'Microsoft Zira',              // Windows — clear female
    'Karen',                       // Mac Australian — clear
    'Moira',                       // Mac Irish — clear
    'Tessa',                       // Mac South African — clear
    'Victoria',                    // Mac
    'Fiona',                       // Mac Scottish
    'Daniel',                      // Mac — clear male fallback
  ];
  for (const name of preferred) {
    const v = voices.find(v => v.name.includes(name) && v.lang.startsWith('en'));
    if (v) { femaleVoice = v; return; }
  }
  // Fallback: any English female voice, then any English voice
  femaleVoice = voices.find(v => v.lang.startsWith('en') && /female|woman|samantha|karen|victoria|zira|tessa|moira|fiona/i.test(v.name))
    || voices.find(v => v.lang.startsWith('en'))
    || null;
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = initVoice;
  initVoice();
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.75;
  u.pitch = 1.05;
  u.volume = 1.0;
  u.lang = 'en-US';
  if (femaleVoice) u.voice = femaleVoice;
  window.speechSynthesis.speak(u);
}

function startGame(level) {
  if (level === 'tricky') { showTrickyMenu(); return; }
  if (level === 'weak') { startWeakWordsGame(); return; }
  state.level = level; state.trickyCategory = null; state.score = 0; state.currentIndex = 0; state.results = []; state.hintsUsed = 0;
  state.words = weightedShuffle([...WORDS[level]]).slice(0, ROUNDS_PER_GAME);
  showScreen(gameScreen); loadWord();
}

function startWeakWordsGame() {
  const weak = getWeakWords(); if (weak.length === 0) return;
  state.level = 'weak'; state.trickyCategory = null; state.score = 0; state.currentIndex = 0; state.results = []; state.hintsUsed = 0;
  state.words = weak.slice(0, Math.min(ROUNDS_PER_GAME, weak.length));
  showScreen(gameScreen); loadWord();
}

function loadWord() {
  const item = state.words[state.currentIndex]; const word = item.word;
  const isTricky = state.level === 'tricky' || state.level === 'weak';
  scoreDisplay.textContent = `Score: ${state.score} / ${state.words.length}`;
  progressFill.style.width = `${(state.currentIndex / state.words.length) * 100}%`;
  hintText.textContent = ''; state.trickyRevealed = false;
  const patternBadge = document.getElementById('pattern-badge');
  const trickyBtnEl = document.getElementById('tricky-btn');
  if (isTricky && item.pattern) { patternBadge.textContent = item.pattern; patternBadge.style.display = 'inline-block'; trickyBtnEl.style.display = 'block'; }
  else { patternBadge.style.display = 'none'; trickyBtnEl.style.display = 'none'; }
  const masteryIndicator = document.getElementById('mastery-indicator');
  const mastery = getWordMastery(word);
  const mc = { 'new': { text: 'New', class: 'mastery-new' }, 'struggling': { text: 'Needs Practice', class: 'mastery-struggling-badge' }, 'learning': { text: 'Learning', class: 'mastery-learning-badge' }, 'mastered': { text: 'Mastered', class: 'mastery-mastered-badge' } }[mastery];
  masteryIndicator.textContent = mc.text; masteryIndicator.className = 'mastery-indicator ' + mc.class;
  letterInputArea.innerHTML = '';
  for (let i = 0; i < word.length; i++) {
    const input = document.createElement('input'); input.type = 'text'; input.maxLength = 1; input.className = 'letter-box';
    if (isTricky && item.tricky && item.tricky.includes(i)) input.classList.add('tricky-letter');
    input.setAttribute('autocapitalize', 'none'); input.setAttribute('autocorrect', 'off');
    input.setAttribute('autocomplete', 'off'); input.setAttribute('spellcheck', 'false');
    input.setAttribute('data-index', i);
    input.addEventListener('input', onLetterInput); input.addEventListener('keydown', onLetterKeydown);
    letterInputArea.appendChild(input);
  }
  letterInputArea.querySelector('.letter-box').focus();
  setTimeout(() => speak(word), 400);
  checkBtn.disabled = false;
}

function onLetterInput(e) {
  if (e.target.value.length === 1) {
    const idx = parseInt(e.target.dataset.index); const boxes = letterInputArea.querySelectorAll('.letter-box');
    if (idx < boxes.length - 1) boxes[idx + 1].focus();
  }
}

function onLetterKeydown(e) {
  const idx = parseInt(e.target.dataset.index); const boxes = letterInputArea.querySelectorAll('.letter-box');
  if (e.key === 'Backspace' && e.target.value === '' && idx > 0) { boxes[idx-1].focus(); boxes[idx-1].value = ''; e.preventDefault(); }
  else if (e.key === 'Enter') checkSpelling();
}

function checkSpelling() {
  const item = state.words[state.currentIndex]; const word = item.word;
  const boxes = letterInputArea.querySelectorAll('.letter-box');
  const isTricky = state.level === 'tricky' || state.level === 'weak';
  let answer = ''; boxes.forEach(b => { answer += b.value.toLowerCase(); });
  const isCorrect = answer === word.toLowerCase();
  boxes.forEach((box, i) => {
    setTimeout(() => {
      const ok = box.value.toLowerCase() === word[i].toLowerCase();
      box.classList.add(ok ? 'correct' : 'wrong');
      if (isTricky && item.tricky && item.tricky.includes(i) && ok) box.classList.add('tricky-highlight-correct');
    }, i * 80);
  });
  recordResult(word, isCorrect);
  // XP & streak
  if (isCorrect) { state.sessionStreak++; } else { state.sessionStreak = 0; }
  const xpEarned = calcXP(isCorrect, state.level, state.wordHintUsed, state.sessionStreak);
  state.results.push({ word, answer, correct: isCorrect, pattern: item.pattern || null, rule: item.rule || null, tricky: item.tricky || null, xp: xpEarned });
  if (isCorrect) state.score++;
  // Update rewards
  const rewards = loadRewards();
  const oldLevel = getLevel(rewards.totalXP);
  rewards.totalXP += xpEarned;
  if (isCorrect) { rewards.totalCorrect++; rewards.currentStreak++; }
  else { rewards.currentStreak = 0; }
  if (rewards.currentStreak > rewards.bestStreak) rewards.bestStreak = rewards.currentStreak;
  rewards.levelsPlayed.add(state.level);
  // Count tricky mastered
  const sr = loadSR();
  rewards.trickyMastered = Object.entries(sr).filter(([w, d]) => {
    const isT = WORDS.tricky.some(tw => tw.word === w);
    return isT && d.streak >= 3 && d.correct / d.attempts >= 0.8;
  }).length;
  saveRewards(rewards);
  state.wordHintUsed = false;
  checkBtn.disabled = true;
  setTimeout(() => showFeedback(isCorrect, word), boxes.length * 80 + 400);
}

function showFeedback(isCorrect, word) {
  const item = state.words[state.currentIndex];
  const isTricky = state.level === 'tricky' || state.level === 'weak';
  const feedback = document.createElement('div');
  feedback.className = `feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}`;
  const emoji = isCorrect ? ['Amazing!','Super!','Great job!','Awesome!','Fantastic!'][Math.floor(Math.random()*5)] : 'Oops!';
  const emojiIcon = isCorrect ? ['star','tada','sparkles','rainbow','trophy'][Math.floor(Math.random()*5)] : 'thinking';
  const emojiMap = { star:'\u2B50', tada:'\uD83C\uDF89', sparkles:'\u2728', rainbow:'\uD83C\uDF08', trophy:'\uD83C\uDFC6', thinking:'\uD83E\uDD14' };
  let wordHtml = '';
  if (isTricky && item.tricky) { for (let i = 0; i < word.length; i++) { wordHtml += item.tricky.includes(i) ? `<span class="feedback-tricky-letter">${word[i]}</span>` : word[i]; } }
  else { wordHtml = word; }
  let ruleHtml = isTricky && item.rule ? `<div class="feedback-rule">${item.rule}</div>` : '';
  const sr = loadSR(); const srData = sr[word];
  let streakHtml = state.sessionStreak >= 2 ? `<div class="feedback-streak">\uD83D\uDD25 ${state.sessionStreak} in a row!</div>` : '';
  const lastResult = state.results[state.results.length - 1];
  const xpHtml = `<div class="feedback-xp">+${lastResult.xp} XP</div>`;
  feedback.innerHTML = `<div class="feedback-emoji">${emojiMap[emojiIcon]}</div><div class="feedback-text">${emoji}</div><div class="feedback-word">${wordHtml}</div>${xpHtml}${streakHtml}${ruleHtml}<button class="feedback-continue" onclick="this.parentElement.remove(); nextWord();">${state.currentIndex < state.words.length - 1 ? 'Next Word' : 'See Results'}</button>`;
  document.body.appendChild(feedback);
  if (isCorrect) { speak('Correct!'); } else { speak(`The correct spelling is ${word.split('').join(', ')}${isTricky && item.rule ? '. Remember: ' + item.rule : ''}`); }
}

function nextWord() { state.currentIndex++; if (state.currentIndex >= state.words.length) showResults(); else loadWord(); }

function showHint() {
  const item = state.words[state.currentIndex];
  const isTricky = state.level === 'tricky' || state.level === 'weak';
  if (isTricky && item.rule) hintText.innerHTML = `${item.hint}<br><span class="rule-hint">${item.rule}</span>`;
  else hintText.textContent = item.hint;
  state.hintsUsed++;
  state.wordHintUsed = true;
}

function showTrickyLetters() {
  const item = state.words[state.currentIndex]; if (!item.tricky) return;
  state.trickyRevealed = true; const boxes = letterInputArea.querySelectorAll('.letter-box');
  item.tricky.forEach(idx => { boxes[idx].value = item.word[idx]; boxes[idx].classList.add('tricky-revealed'); boxes[idx].readOnly = true; });
  for (const box of boxes) { if (!box.value) { box.focus(); break; } }
}

function showResults() {
  showScreen(resultsScreen);
  const pct = Math.round((state.score / state.words.length) * 100);
  const correct = state.results.filter(r => r.correct).length;
  const wrong = state.results.filter(r => !r.correct).length;
  let emoji, message;
  if (pct === 100) { emoji = '\uD83C\uDFC6'; message = 'Perfect score! You are a spelling champion!'; }
  else if (pct >= 80) { emoji = '\u2B50'; message = 'Amazing work! Almost perfect!'; }
  else if (pct >= 60) { emoji = '\uD83D\uDE0A'; message = 'Good job! Keep practicing!'; }
  else { emoji = '\uD83D\uDCAA'; message = 'Nice try! Practice makes perfect!'; }
  document.getElementById('results-emoji').textContent = emoji;
  document.getElementById('results-title').textContent = pct === 100 ? 'Perfect!' : pct >= 80 ? 'Great Job!' : pct >= 60 ? 'Good Work!' : 'Keep Going!';
  document.getElementById('results-score').textContent = `${state.score} / ${state.words.length}`;
  document.getElementById('results-message').textContent = message;
  document.getElementById('correct-count').textContent = correct;
  document.getElementById('wrong-count').textContent = wrong;
  const missedContainer = document.getElementById('missed-words');
  const missed = state.results.filter(r => !r.correct);
  if (missed.length > 0) {
    missedContainer.style.display = 'block';
    const list = document.getElementById('missed-list'); list.innerHTML = '';
    missed.forEach(m => {
      const div = document.createElement('div'); div.className = 'missed-word-item';
      let patternHtml = m.pattern ? `<div class="missed-pattern">${m.pattern}</div>` : '';
      let correctHtml = m.word;
      if (m.tricky) { correctHtml = ''; for (let i = 0; i < m.word.length; i++) correctHtml += m.tricky.includes(i) ? `<span class="tricky-highlight">${m.word[i]}</span>` : m.word[i]; }
      div.innerHTML = `<div><span>You typed: <strong>${m.answer || '(empty)'}</strong></span>${patternHtml}</div><span class="correct-spelling">${correctHtml}</span>`;
      list.appendChild(div);
    });
  } else { missedContainer.style.display = 'none'; }
  // XP & Level summary
  const rewards = loadRewards();
  const today = new Date().toDateString();
  if (rewards.lastPlayDate !== today) { rewards.gamesPlayedToday = 0; rewards.lastPlayDate = today; }
  rewards.totalGames++;
  rewards.gamesPlayedToday++;
  if (pct === 100) rewards.perfectGames++;
  saveRewards(rewards);

  const totalXPEarned = state.results.reduce((sum, r) => sum + r.xp, 0);
  const level = getLevel(rewards.totalXP);
  const nextThreshold = LEVEL_THRESHOLDS[Math.min(level + 1, LEVEL_THRESHOLDS.length - 1)];
  const prevThreshold = LEVEL_THRESHOLDS[level];
  const progressPct = level >= LEVEL_THRESHOLDS.length - 1 ? 100 : ((rewards.totalXP - prevThreshold) / (nextThreshold - prevThreshold) * 100).toFixed(0);

  // Check for new achievements
  const newUnlocked = [];
  for (const ach of ACHIEVEMENTS) {
    if (!rewards.unlockedAchievements.includes(ach.id) && ach.check(rewards)) {
      rewards.unlockedAchievements.push(ach.id);
      newUnlocked.push(ach);
    }
  }
  if (newUnlocked.length > 0) saveRewards(rewards);

  const masterySummary = document.getElementById('mastery-summary');
  masterySummary.style.display = 'block';
  let achievementHtml = '';
  if (newUnlocked.length > 0) {
    achievementHtml = `<div class="new-achievements"><h3 class="achievement-title">New Achievement${newUnlocked.length > 1 ? 's' : ''}!</h3>${newUnlocked.map(a => `<div class="achievement-card"><span class="achievement-icon">${a.icon}</span><div class="achievement-info"><strong>${a.name}</strong><span>${a.desc}</span></div></div>`).join('')}</div>`;
  }

  masterySummary.innerHTML = `
    <div class="xp-summary">
      <div class="xp-earned">+${totalXPEarned} XP earned!</div>
      <div class="level-display">
        <span class="level-badge">Lv.${level + 1}</span>
        <span class="level-title">${LEVEL_TITLES[level]}</span>
      </div>
      <div class="level-progress-bar">
        <div class="level-progress-fill" style="width:${progressPct}%"></div>
      </div>
      <div class="xp-to-next">${rewards.totalXP} / ${nextThreshold} XP</div>
    </div>
    <div class="stats-row">
      <div class="stat-item"><span class="stat-number">\uD83D\uDD25 ${rewards.bestStreak}</span><span class="stat-label">Best Streak</span></div>
      <div class="stat-item"><span class="stat-number">\u2B50 ${rewards.totalCorrect}</span><span class="stat-label">Total Correct</span></div>
      <div class="stat-item"><span class="stat-number">\uD83C\uDFC6 ${rewards.perfectGames}</span><span class="stat-label">Perfect Rounds</span></div>
    </div>
    <div class="badges-row">${rewards.unlockedAchievements.map(id => { const a = ACHIEVEMENTS.find(x => x.id === id); return a ? `<span class="earned-badge" title="${a.name}">${a.icon}</span>` : ''; }).join('')}</div>
    ${achievementHtml}
  `;
}

function goHome() { updateTitleScreen(); showScreen(titleScreen); }

function resetProgress() {
  if (confirm('This will erase all your progress. Are you sure?')) { localStorage.removeItem(SR_STORAGE_KEY); localStorage.removeItem(REWARDS_KEY); updateTitleScreen(); }
}

listenBtn.addEventListener('click', () => { speak(state.words[state.currentIndex].word); listenBtn.style.transform = 'scale(0.9)'; setTimeout(() => { listenBtn.style.transform = ''; }, 150); });
checkBtn.addEventListener('click', checkSpelling);
hintBtn.addEventListener('click', showHint);

updateTitleScreen();
  </script>
